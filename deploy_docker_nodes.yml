---
- name: Setup Debian/Ubuntu Docker Nodes
  hosts: docker_nodes
  become: true
  gather_facts: true

  vars_files:
    - secrets.yml

  roles:
    - role: common
      tags: ['common']
    - role: ssh_hardening
      tags: ['security', 'ssh', 'hardening']
    - role: docker_host
      tags: ['docker']
    - role: prod_apps
      tags: ['prod_apps']
    - role: utility_tools
      tags: ['utility_tools']
    - role: navidrome
      tags: ['navidrome']
    - role: books_stack
      tags: ['books_stack']
    - role: siyuan
      tags: ['siyuan']
    - role: excalidraw
      tags: ['excalidraw']
    - role: mealie
      tags: ['mealie']
    - role: syncthing
      tags: ['syncthing']
      when: syncthing_enabled | default(false)
    - role: linkwarden
      tags: ['linkwarden']
    - role: monitoring_exporters
      tags: ['monitoring', 'exporters']
      when: monitoring_enabled | default(false) | bool
    - role: monitoring_stack
      tags: ['monitoring', 'monitoring_stack']
      when: monitoring_enabled | default(false) | bool
