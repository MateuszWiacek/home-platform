---
- name: "Validate | Docker is available"
  ansible.builtin.command:
    cmd: "docker info --format '{% raw %}{{ .ServerVersion }}{% endraw %}'"
  changed_when: false
  check_mode: false
  register: _docker_check

- name: "Validate | Docker check result"
  ansible.builtin.assert:
    that: _docker_check.rc == 0
    fail_msg: "Docker is not running or not accessible."
    quiet: true

- name: "Validate | Authentik Postgres exporter secrets"
  ansible.builtin.assert:
    that:
      - authentik_postgres_password is defined
      - authentik_postgres_password | length > 0
    fail_msg: "authentik_postgres_password is required when authentik_postgres_exporter_enabled is true."
    quiet: true
  when: authentik_postgres_exporter_enabled | default(false) | bool
