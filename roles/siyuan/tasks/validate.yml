---
# ============================================================
# PRE-FLIGHT VALIDATION - SIYUAN
# Verify access code secret before deploy.
# ============================================================

- name: "Validate | Docker is available"
  ansible.builtin.command:
    cmd: "docker info"
  check_mode: false
  changed_when: false
  failed_when: false
  register: _docker_check

- name: "Validate | Docker is running"
  ansible.builtin.assert:
    that: _docker_check.rc == 0
    fail_msg: "Docker is not running. Ensure docker_host role has been applied."
    quiet: true

- name: "Validate | Required secrets are defined"
  ansible.builtin.assert:
    that:
      - vault_siyuan_access_code is defined
      - vault_siyuan_access_code | length > 0
    fail_msg: >-
      SiYuan requires vault_siyuan_access_code in secrets.yml.
      This is the password gate for the web UI.
    quiet: true
