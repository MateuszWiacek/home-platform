---
# Create local directories on Ryzen NVMe for performance-critical data
- name: "Immich | Create managed app directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'
  loop:
    - "{{ immich_stack_dir }}"
    - "{{ immich_model_cache_dir }}"

- name: "Immich | Create runtime data directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ immich_db_dir }}"
    - "{{ immich_stack_dir }}/redis"

- name: "Immich | Deploy docker-compose file"
  ansible.builtin.template:
    src: "immich/docker-compose.yml.j2"
    dest: "{{ immich_stack_dir }}/docker-compose.yml"
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0644'
  notify: Restart Immich

- name: "Immich | Deploy environment file"
  ansible.builtin.template:
    src: "immich/env.j2"
    dest: "{{ immich_stack_dir }}/.env"
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0600'
  no_log: true
  notify: Restart Immich

- name: "Immich | Start containers"
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ immich_stack_dir }}"
  changed_when: false
