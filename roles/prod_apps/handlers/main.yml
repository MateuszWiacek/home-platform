---
- name: Restart Immich
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ immich_stack_dir }}"
  when: not ansible_check_mode

- name: Restart Paperless
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ paperless_stack_dir }}"
  when: not ansible_check_mode
