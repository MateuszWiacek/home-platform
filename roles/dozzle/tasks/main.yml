---
- name: "Dozzle | Pre-flight validation"
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: "Dozzle | Ensure stack directory exists"
  ansible.builtin.file:
    path: "{{ dozzle_stack_dir }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'

- name: "Dozzle | Deploy docker-compose"
  ansible.builtin.template:
    src: "dozzle/docker-compose.yml.j2"
    dest: "{{ dozzle_stack_dir }}/docker-compose.yml"
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0644'
  notify: Restart dozzle

- name: "Dozzle | Start containers"
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ dozzle_stack_dir }}"
  changed_when: false
  when: not ansible_check_mode
