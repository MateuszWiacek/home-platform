---
- name: Restart Homepage
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ homepage_stack_dir }}"
  when: not ansible_check_mode

- name: Restart Jellyfin
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ jellyfin_stack_dir }}"
  when: not ansible_check_mode
