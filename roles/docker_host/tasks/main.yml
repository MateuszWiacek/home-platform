---
- name: "Docker Host | Validate supported OS family"
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] | lower in ['ubuntu', 'debian']
    fail_msg: "docker_host role supports only Debian/Ubuntu."

- name: "Docker Host | Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Docker Host | Install prerequisites"
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
      - apt-transport-https
    state: present

- name: "Docker Host | Ensure apt keyrings directory exists"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: "Docker Host | Download Docker GPG key"
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  register: docker_gpg_key_download
  changed_when: docker_gpg_key_download.changed and not ansible_check_mode

- name: "Docker Host | Add Docker apt repository"
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_repo_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
  vars:
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
    docker_repo_arch: "{{ docker_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

- name: "Docker Host | Install Docker Engine packages"
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: "Docker Host | Ensure Docker service is enabled and started"
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: "Docker Host | Check current daemon.json"
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: docker_daemon_json

- name: "Docker Host | Read current daemon.json"
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: docker_daemon_json_raw
  when: docker_daemon_json.stat.exists

- name: "Docker Host | Build merged daemon.json"
  ansible.builtin.set_fact:
    docker_daemon_config: >-
      {{
        (docker_daemon_json_raw.content | b64decode | from_json)
        if docker_daemon_json.stat.exists
        else {}
      }}
  changed_when: false

- name: "Docker Host | Configure Docker daemon (log rotation)"
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: >-
      {{
        docker_daemon_config
        | combine(
            {
              'log-driver': 'json-file',
              'log-opts': {
                'max-size': '10m',
                'max-file': '3'
              }
            },
            recursive=True
          )
        | to_nice_json
      }}
    mode: '0644'
  notify: Restart Docker service

- name: "Docker Host | Add user to docker group"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: "Docker Host | Create generic stacks directory"
  ansible.builtin.file:
    path: "/opt/stacks"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: docker

- name: "Docker Host | Deploy Portainer Agent"
  community.docker.docker_container:
    name: portainer_agent
    image: "portainer/agent:{{ portainer_agent_version }}"
    state: started
    restart_policy: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
    memory: "128m"
    memory_swap: "128m"
