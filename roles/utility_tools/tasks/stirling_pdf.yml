---
- name: "Stirling-PDF | Ensure stack directory"
  ansible.builtin.file:
    path: "{{ stirling_pdf_stack_dir }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'

- name: "Stirling-PDF | Ensure persistent directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'
  loop:
    - "{{ stirling_pdf_stack_dir }}/data"
    - "{{ stirling_pdf_stack_dir }}/configs"

- name: "Stirling-PDF | Deploy docker-compose file"
  ansible.builtin.template:
    src: "stirling-pdf/docker-compose.yml.j2"
    dest: "{{ stirling_pdf_stack_dir }}/docker-compose.yml"
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0644'
  notify: Restart Stirling-PDF

- name: "Stirling-PDF | Start containers"
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ stirling_pdf_stack_dir }}"
  changed_when: false
