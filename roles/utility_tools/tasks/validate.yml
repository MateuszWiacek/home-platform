---
# ============================================================
# PRE-FLIGHT VALIDATION - UTILITY TOOLS
# Stateless toolboxes - minimal validation.
# ============================================================

- name: "Validate | Docker is available"
  ansible.builtin.command:
    cmd: "docker info"
  check_mode: false
  changed_when: false
  failed_when: false
  register: _docker_check

- name: "Validate | Docker is running"
  ansible.builtin.assert:
    that: _docker_check.rc == 0
    fail_msg: "Docker is not running. Ensure docker_host role has been applied."
    quiet: true
