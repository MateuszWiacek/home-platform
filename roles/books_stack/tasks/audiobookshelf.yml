---
- name: "Audiobookshelf | Ensure stack directory"
  ansible.builtin.file:
    path: "{{ audiobookshelf_stack_dir }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'

- name: "Audiobookshelf | Ensure persistent directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'
  loop:
    - "{{ audiobookshelf_config_dir }}"
    - "{{ audiobookshelf_metadata_dir }}"

- name: "Audiobookshelf | Deploy docker-compose file"
  ansible.builtin.template:
    src: "audiobookshelf/docker-compose.yml.j2"
    dest: "{{ audiobookshelf_stack_dir }}/docker-compose.yml"
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0644'
  notify: Restart Audiobookshelf

- name: "Audiobookshelf | Start containers"
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ audiobookshelf_stack_dir }}"
  changed_when: false
  when: not ansible_check_mode
