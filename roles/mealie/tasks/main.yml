---
# ============================================================
# MEALIE: Self-hosted recipe manager
# SQLite-backed, no external database required.
# ============================================================

- name: "Mealie | Pre-flight validation"
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: "Mealie | Ensure stack directory"
  ansible.builtin.file:
    path: "{{ mealie_stack_dir }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'

- name: "Mealie | Ensure data directory"
  ansible.builtin.file:
    path: "{{ mealie_data_dir }}"
    state: directory
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0755'

- name: "Mealie | Deploy docker-compose file"
  ansible.builtin.template:
    src: "mealie/docker-compose.yml.j2"
    dest: "{{ mealie_stack_dir }}/docker-compose.yml"
    owner: "{{ app_uid }}"
    group: "{{ app_gid }}"
    mode: '0644'
  notify: Restart Mealie

- name: "Mealie | Start containers"
  ansible.builtin.shell:
    cmd: "docker compose up -d --remove-orphans"
    chdir: "{{ mealie_stack_dir }}"
  changed_when: false
  when: not ansible_check_mode
