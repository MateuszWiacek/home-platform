---
# ============================================================
# POST-DEPLOY SMOKE TEST
# Run after deploy to verify container health and service endpoints.
#
# Usage:
#   ansible-playbook -i inventory.ini smoke_test.yml
#   ansible-playbook -i inventory.ini smoke_test.yml --tags nas
#   ansible-playbook -i inventory.ini smoke_test.yml --tags ryzen
# ============================================================

- name: "Smoke Test - NAS (core + media)"
  hosts: n100
  become: true
  gather_facts: false
  tags: [nas]

  vars:
    nas_expected_containers: >-
      {{
        [
          'traefik',
          'adguard',
          'authentik-server',
          'authentik-worker',
          'authentik-db',
          'authentik-redis',
          'authentik-ldap-outpost',
          'vaultwarden',
          'portainer',
          'jellyfin',
          'homepage'
        ]
        + (['node_exporter', 'cadvisor', 'promtail'] if monitoring_enabled | default(false) | bool else [])
        + (['smartctl_exporter'] if monitoring_enabled | default(false) | bool and smartctl_exporter_enabled | default(false) | bool else [])
        + (['dozzle_agent'] if monitoring_enabled | default(false) | bool and dozzle_agent_enabled | default(false) | bool else [])
        + (['ntfy'])
      }}

    public_https_endpoints: >-
      {{
        [
          { "name": "Authentik", "url": "https://%s" | format(authentik_domain) },
          { "name": "AdGuard Home", "url": "https://%s" | format(adguard_domain) },
          { "name": "Vaultwarden", "url": "https://%s" | format(vaultwarden_domain) },
          { "name": "Portainer", "url": "https://%s" | format(portainer_domain) },
          { "name": "Homepage", "url": "https://%s" | format(homepage_domain) },
          { "name": "Jellyfin", "url": "https://%s" | format(jellyfin_domain) },
          { "name": "Immich", "url": "https://%s" | format(immich_domain) },
          { "name": "Paperless", "url": "https://%s" | format(paperless_domain) },
          { "name": "Stirling-PDF", "url": "https://%s" | format(stirling_pdf_domain) },
          { "name": "IT-Tools", "url": "https://%s" | format(it_tools_domain) },
          { "name": "Navidrome", "url": "https://%s" | format(navidrome_domain) },
          { "name": "SiYuan", "url": "https://%s" | format(siyuan_domain) },
          { "name": "Excalidraw", "url": "https://%s" | format(excalidraw_domain) },
          { "name": "Mealie", "url": "https://%s" | format(mealie_domain) },
          { "name": "Linkwarden", "url": "https://%s" | format(linkwarden_domain) },
          { "name": "TrueNAS", "url": "https://%s" | format(truenas_domain) }
        ]
        + ([{ "name": "Grafana", "url": "https://%s" | format(grafana_domain) }] if monitoring_enabled | default(false) | bool else [])
        + ([{ "name": "Dozzle", "url": "https://%s" | format(dozzle_domain) }] if monitoring_enabled | default(false) | bool and dozzle_enabled | default(false) | bool else [])
        + ([{ "name": "Ntfy", "url": "https://%s" | format(ntfy_domain) }])
        + ([{ "name": "Audiobookshelf", "url": "https://%s" | format(audiobookshelf_domain) }] if audiobookshelf_enabled | default(false) else [])
        + ([{ "name": "Calibre-Web", "url": "https://%s" | format(calibre_web_domain) }] if calibre_web_enabled | default(false) else [])
        + ([{ "name": "Syncthing", "url": "https://%s" | format(syncthing_domain) }] if syncthing_enabled | default(false) else [])
      }}

  tasks:
    - name: "NAS | Check container status"
      ansible.builtin.command:
        cmd: "docker ps --format '{% raw %}{{ .Names }} {{ .Status }}{% endraw %}' --filter name=^/{{ item }}$"
      register: _nas_containers
      loop: "{{ nas_expected_containers }}"
      changed_when: false
      failed_when: false

    - name: "NAS | Report container health"
      ansible.builtin.debug:
        msg: >-
          {{ item.item }}:
          {{ 'UP' if item.stdout | length > 0 and 'Up' in item.stdout else 'DOWN' }}
          {{ '- ' + item.stdout if item.stdout | length > 0 else '' }}
      loop: "{{ _nas_containers.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "NAS | Assert all containers are running"
      ansible.builtin.assert:
        that:
          - item.stdout | length > 0
          - "'Up' in item.stdout"
        fail_msg: "Container {{ item.item }} is not running!"
        quiet: true
      loop: "{{ _nas_containers.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "NAS | Verify RAM limits are enforced on critical containers"
      ansible.builtin.command:
        cmd: >-
          docker inspect --format
          '{% raw %}{{ .Name }} mem={{ .HostConfig.Memory }}{% endraw %}'
          traefik adguard vaultwarden portainer jellyfin homepage
      register: _ram_limits
      changed_when: false

    - name: "NAS | Display RAM limits"
      ansible.builtin.debug:
        msg: "{{ _ram_limits.stdout_lines }}"

    - name: "NAS | Verify Traefik dashboard responds (LAN)"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ traefik_dashboard_port }}/api/overview"
        return_content: false
        status_code: 200
        timeout: 10
      when: traefik_publish_api_port | default(false)

    - name: "NAS | DNS resolve check (AdGuard)"
      ansible.builtin.command:
        cmd: "dig +short {{ authentik_domain }} @127.0.0.1"
      register: _dns_check
      changed_when: false
      failed_when: _dns_check.stdout | length == 0

    - name: "NAS | DNS resolves to"
      ansible.builtin.debug:
        msg: "{{ authentik_domain }} → {{ _dns_check.stdout }}"

    - name: "NAS | Verify public HTTPS endpoints respond"
      ansible.builtin.uri:
        url: "{{ item.url }}"
        return_content: false
        follow_redirects: none
        status_code: [200, 302, 401, 403]
        timeout: 10
      loop: "{{ public_https_endpoints }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "NAS | Verify SMART exporter responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ smartctl_exporter_port | default(9633) }}/metrics"
        return_content: false
        status_code: 200
        timeout: 10
      when:
        - monitoring_enabled | default(false) | bool
        - smartctl_exporter_enabled | default(false) | bool

    - name: "NAS | Gather service facts"
      ansible.builtin.service_facts:

    - name: "NAS | Assert archwright timers are active"
      ansible.builtin.assert:
        that:
          - timer_unit in ansible_facts.services
          - ansible_facts.services[timer_unit].status != "not-found"
          - ansible_facts.services[timer_unit].state == "running"
        fail_msg: "archwright timer {{ timer_unit }} is missing or inactive"
        quiet: true
      loop: "{{ archwright_jobs | default([]) | selectattr('enabled', 'equalto', true) | map(attribute='name') | list }}"
      loop_control:
        loop_var: job_name
        label: "{{ timer_unit }}"
      vars:
        timer_unit: "archwright-{{ job_name }}.timer"

    - name: "NAS | Archwright timer status"
      ansible.builtin.debug:
        msg: "{{ timer_unit }}: state={{ ansible_facts.services[timer_unit].state }}, status={{ ansible_facts.services[timer_unit].status }}"
      loop: "{{ archwright_jobs | default([]) | selectattr('enabled', 'equalto', true) | map(attribute='name') | list }}"
      loop_control:
        loop_var: job_name
        label: "{{ timer_unit }}"
      vars:
        timer_unit: "archwright-{{ job_name }}.timer"

    - name: "NAS | Validate archwright configs"
      ansible.builtin.command:
        cmd: "{{ archwright_cli_path }} validate --config {{ item.config_path }}"
      loop: "{{ archwright_jobs | default([]) | selectattr('enabled', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false


- name: "Smoke Test - Ryzen (prod apps)"
  hosts: docker_nodes
  become: true
  gather_facts: false
  tags: [ryzen]

  vars:
    ryzen_expected_containers: >-
      {{
        [
          'immich_server',
          'immich_machine_learning',
          'immich_postgres',
          'immich_redis',
          'paperless_webserver',
          'paperless_db',
          'paperless_redis',
          'portainer_agent',
          'stirling_pdf',
          'it_tools',
          'navidrome',
          'siyuan',
          'excalidraw',
          'mealie',
          'linkwarden',
          'linkwarden_db'
        ]
        + (['prometheus', 'grafana', 'alertmanager', 'loki', 'node_exporter', 'cadvisor', 'promtail'] if monitoring_enabled | default(false) | bool else [])
        + (['dozzle'] if monitoring_enabled | default(false) | bool and dozzle_enabled | default(false) | bool else [])
        + (['audiobookshelf'] if audiobookshelf_enabled | default(false) else [])
        + (['calibre_web'] if calibre_web_enabled | default(false) else [])
        + (['syncthing'] if syncthing_enabled | default(false) else [])
      }}

  tasks:
    - name: "Ryzen | Check container status"
      ansible.builtin.command:
        cmd: "docker ps --format '{% raw %}{{ .Names }} {{ .Status }}{% endraw %}' --filter name=^/{{ item }}$"
      register: _ryzen_containers
      loop: "{{ ryzen_expected_containers }}"
      changed_when: false
      failed_when: false

    - name: "Ryzen | Report container health"
      ansible.builtin.debug:
        msg: >-
          {{ item.item }}:
          {{ 'UP' if item.stdout | length > 0 and 'Up' in item.stdout else 'DOWN' }}
          {{ '- ' + item.stdout if item.stdout | length > 0 else '' }}
      loop: "{{ _ryzen_containers.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Ryzen | Assert all containers are running"
      ansible.builtin.assert:
        that:
          - item.stdout | length > 0
          - "'Up' in item.stdout"
        fail_msg: "Container {{ item.item }} is not running!"
        quiet: true
      loop: "{{ _ryzen_containers.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Ryzen | Verify NFS mounts are active"
      ansible.builtin.command:
        cmd: "findmnt --noheadings --output TARGET,FSTYPE --types nfs,nfs4"
      register: _nfs_mounts
      changed_when: false

    - name: "Ryzen | Display NFS mounts"
      ansible.builtin.debug:
        msg: "{{ _nfs_mounts.stdout_lines }}"

    - name: "Ryzen | Verify Immich HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ immich_service_port }}/api/server/ping"
        return_content: true
        status_code: 200
        timeout: 10
      register: _immich_ping
      failed_when: false

    - name: "Ryzen | Immich status"
      ansible.builtin.debug:
        msg: "Immich: {{ 'OK' if _immich_ping.status == 200 else 'UNREACHABLE (status: ' + (_immich_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Paperless HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ paperless_service_port }}/"
        headers:
          Host: "{{ paperless_domain }}"
        return_content: false
        follow_redirects: none
        status_code: [200, 302]
        timeout: 10
      register: _paperless_ping
      failed_when: false

    - name: "Ryzen | Paperless status"
      ansible.builtin.debug:
        msg: "Paperless: {{ 'OK' if _paperless_ping.status in [200, 302] else 'UNREACHABLE (status: ' + (_paperless_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Navidrome HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ navidrome_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302, 401]
        timeout: 10
      register: _navidrome_ping
      failed_when: false

    - name: "Ryzen | Navidrome status"
      ansible.builtin.debug:
        msg: "Navidrome: {{ 'OK' if _navidrome_ping.status in [200, 302, 401] else 'UNREACHABLE (status: ' + (_navidrome_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Audiobookshelf HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ audiobookshelf_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302, 401]
        timeout: 10
      register: _audiobookshelf_ping
      failed_when: false
      when: audiobookshelf_enabled | default(false)

    - name: "Ryzen | Audiobookshelf status"
      ansible.builtin.debug:
        msg: "Audiobookshelf: {{ 'OK' if _audiobookshelf_ping.status in [200, 302, 401] else 'UNREACHABLE (status: ' + (_audiobookshelf_ping.status | string) + ')' }}"
      when: audiobookshelf_enabled | default(false)

    - name: "Ryzen | Verify Calibre-Web HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ calibre_web_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302, 401]
        timeout: 10
      register: _calibre_web_ping
      failed_when: false
      when: calibre_web_enabled | default(false)

    - name: "Ryzen | Calibre-Web status"
      ansible.builtin.debug:
        msg: "Calibre-Web: {{ 'OK' if _calibre_web_ping.status in [200, 302, 401] else 'UNREACHABLE (status: ' + (_calibre_web_ping.status | string) + ')' }}"
      when: calibre_web_enabled | default(false)

    - name: "Ryzen | Verify SiYuan HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ siyuan_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302, 401, 403]
        timeout: 10
      register: _siyuan_ping
      failed_when: false

    - name: "Ryzen | SiYuan status"
      ansible.builtin.debug:
        msg: "SiYuan: {{ 'OK' if _siyuan_ping.status in [200, 302, 401, 403] else 'UNREACHABLE (status: ' + (_siyuan_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Excalidraw HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ excalidraw_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302]
        timeout: 10
      register: _excalidraw_ping
      failed_when: false

    - name: "Ryzen | Excalidraw status"
      ansible.builtin.debug:
        msg: "Excalidraw: {{ 'OK' if _excalidraw_ping.status in [200, 302] else 'UNREACHABLE (status: ' + (_excalidraw_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Mealie HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ mealie_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302]
        timeout: 10
      register: _mealie_ping
      failed_when: false

    - name: "Ryzen | Mealie status"
      ansible.builtin.debug:
        msg: "Mealie: {{ 'OK' if _mealie_ping.status in [200, 302] else 'UNREACHABLE (status: ' + (_mealie_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Linkwarden HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ linkwarden_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302]
        timeout: 10
      register: _linkwarden_ping
      failed_when: false

    - name: "Ryzen | Linkwarden status"
      ansible.builtin.debug:
        msg: "Linkwarden: {{ 'OK' if _linkwarden_ping.status in [200, 302] else 'UNREACHABLE (status: ' + (_linkwarden_ping.status | string) + ')' }}"

    - name: "Ryzen | Verify Prometheus HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prometheus_service_port }}/-/healthy"
        return_content: false
        status_code: 200
        timeout: 10
      register: _prometheus_ping
      failed_when: false
      when: monitoring_enabled | default(false) | bool

    - name: "Ryzen | Prometheus status"
      ansible.builtin.debug:
        msg: "Prometheus: {{ 'OK' if _prometheus_ping.status == 200 else 'UNREACHABLE (status: ' + (_prometheus_ping.status | string) + ')' }}"
      when: monitoring_enabled | default(false) | bool

    - name: "Ryzen | Verify Loki HTTP responds"
      ansible.builtin.uri:
        url: "http://{{ ryzen_ip }}:{{ loki_service_port }}/ready"
        return_content: false
        status_code: 200
        timeout: 10
      register: _loki_ping
      failed_when: false
      retries: 6
      delay: 5
      until: _loki_ping.status == 200
      when: monitoring_enabled | default(false) | bool

    - name: "Ryzen | Loki status"
      ansible.builtin.debug:
        msg: "Loki: {{ 'OK' if _loki_ping.status == 200 else 'UNREACHABLE (status: ' + (_loki_ping.status | string) + ')' }}"
      when: monitoring_enabled | default(false) | bool

    - name: "Ryzen | Verify Alertmanager HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ alertmanager_service_port }}/-/healthy"
        return_content: false
        status_code: 200
        timeout: 10
      register: _alertmanager_ping
      failed_when: false
      when: monitoring_enabled | default(false) | bool

    - name: "Ryzen | Alertmanager status"
      ansible.builtin.debug:
        msg: "Alertmanager: {{ 'OK' if _alertmanager_ping.status == 200 else 'UNREACHABLE (status: ' + (_alertmanager_ping.status | string) + ')' }}"
      when: monitoring_enabled | default(false) | bool

    - name: "Ryzen | Verify Syncthing HTTP responds"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ syncthing_service_port }}/"
        return_content: false
        follow_redirects: none
        status_code: [200, 302, 401, 403]
        timeout: 10
      register: _syncthing_ping
      failed_when: false
      when: syncthing_enabled | default(false)

    - name: "Ryzen | Syncthing status"
      ansible.builtin.debug:
        msg: "Syncthing: {{ 'OK' if _syncthing_ping.status in [200, 302, 401, 403] else 'UNREACHABLE (status: ' + (_syncthing_ping.status | string) + ')' }}"
      when: syncthing_enabled | default(false)

    - name: "Ryzen | Gather service facts"
      ansible.builtin.service_facts:

    - name: "Ryzen | Assert archwright timers are active"
      ansible.builtin.assert:
        that:
          - timer_unit in ansible_facts.services
          - ansible_facts.services[timer_unit].status != "not-found"
          - ansible_facts.services[timer_unit].state == "running"
        fail_msg: "archwright timer {{ timer_unit }} is missing or inactive"
        quiet: true
      loop: "{{ archwright_jobs | default([]) | selectattr('enabled', 'equalto', true) | map(attribute='name') | list }}"
      loop_control:
        loop_var: job_name
        label: "{{ timer_unit }}"
      vars:
        timer_unit: "archwright-{{ job_name }}.timer"

    - name: "Ryzen | Archwright timer status"
      ansible.builtin.debug:
        msg: "{{ timer_unit }}: state={{ ansible_facts.services[timer_unit].state }}, status={{ ansible_facts.services[timer_unit].status }}"
      loop: "{{ archwright_jobs | default([]) | selectattr('enabled', 'equalto', true) | map(attribute='name') | list }}"
      loop_control:
        loop_var: job_name
        label: "{{ timer_unit }}"
      vars:
        timer_unit: "archwright-{{ job_name }}.timer"

    - name: "Ryzen | Validate archwright configs"
      ansible.builtin.command:
        cmd: "{{ archwright_cli_path }} validate --config {{ item.config_path }}"
      loop: "{{ archwright_jobs | default([]) | selectattr('enabled', 'equalto', true) | list }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
