---
extends: default

rules:
  line-length:
    max: 200
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  braces:
    max-spaces-inside: 1
  indentation:
    spaces: 2
    indent-sequences: whatever

ignore:
  # Jinja2 templates are not valid YAML — skip them entirely
  - "roles/*/templates/**"
  # Encrypted vault file
  - "secrets.yml"
